<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16161c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Forge">
<link rel="manifest" href="__BASE__/manifest.webmanifest">
<link rel="apple-touch-icon" href="__BASE__/icon.svg">
<link rel="icon" href="__BASE__/icon.svg">
<link rel="stylesheet" href="__BASE__/styles.css">
<title>Forge remote</title>
</head>
<body>
<div id="banner"></div>
<header>
  <h1>⚒ Forge</h1>
  <button class="iconbtn" id="btnSessions" title="sessions" hidden>☰</button>
  <button class="iconbtn" id="bell" title="notifications">🔕</button>
</header>
<div class="meta">
  <span class="badge" id="expo">—</span>
  <span id="cwd">—</span>
  <span>· session <span id="sid">—</span></span>
  <span id="stitle"></span>
</div>
<div class="panel" id="sessions" hidden>
  <div class="shead"><span>sessions</span><button class="send" id="snew">+ new session</button></div>
  <div id="slist"><div class="empty">loading…</div></div>
  <div class="snewform" id="snewform" hidden>
    <input type="text" id="ncwd" placeholder="working directory (blank = daemon cwd)"
      autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <input type="text" id="ntitle" placeholder="title (optional)" autocomplete="off">
    <label class="wtlabel"><input type="checkbox" id="nwt"> isolated git worktree</label>
    <div class="bar"><button class="send" id="ncreate">Create</button></div>
    <div class="empty" id="nerr" hidden></div>
  </div>
  <div id="pushrow" hidden>
    <div class="shead"><span>push notifications</span><button class="send" id="pushbtn">…</button></div>
    <div class="empty" id="pushinfo"></div>
  </div>
</div>
<div class="status"><span class="dot" id="dot"></span>
  <span class="tier" id="tier">—</span><span id="model">—</span>
  <span class="cost" id="cost">$0.0000</span><span class="ctx" id="ctx"></span>
  <span class="ctx" id="temper"></span></div>
<div class="tabs">
  <button class="tab on" data-tab="chat" id="tab-chat">Chat</button>
  <button class="tab" data-tab="tasks" id="tab-tasks">Tasks <span class="n" id="tc"></span></button>
  <button class="tab" data-tab="agents" id="tab-agents">Agents <span class="n" id="ac"></span></button>
</div>
<div class="panel" id="transcript"><div id="histload" hidden>loading earlier messages…</div><div id="hist"></div><div id="tail"></div></div>
<div class="panel" id="tasks" hidden></div>
<div class="panel" id="agents" hidden></div>
<div class="overlaybox" id="overlay" hidden>
  <div class="ohead"><span id="otitle">—</span><button class="ox" id="ocancel" title="close (Esc)">✕</button></div>
  <input type="text" id="ofilter" placeholder="type to filter…" autocomplete="off"
    autocapitalize="off" autocorrect="off" spellcheck="false" hidden>
  <div class="orows" id="orows"></div>
  <pre class="obody" id="obody" hidden></pre>
  <div class="bar" id="ofreebar" hidden>
    <input type="text" id="ofree" placeholder="value…" autocomplete="off"
      autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="done">
    <button class="send" id="ofreeok">OK</button>
  </div>
</div>
<div class="queued" id="offq" hidden></div>
<div class="actions" id="actions"></div>
<div class="chips">
  <button class="chip stop" id="stop">⏹ Stop</button>
  <button class="chip" data-cmd="/plan">/plan</button>
  <button class="chip" data-cmd="/compact">/compact</button>
  <button class="chip" data-cmd="/model">/model</button>
  <button class="chip" data-cmd="/mode">/mode</button>
  <button class="chip" data-cmd="/help">/help</button>
</div>
<div class="bar">
  <input type="text" id="prompt" placeholder="type a task or /command…" autocomplete="off"
    autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send">
  <button class="send" id="send">Send</button>
</div>
<div class="conn" id="conn">connecting…</div>
<footer>Forge remote control · turn off with <code>/remote</code> in the TUI</footer>
<script src="__BASE__/app.js"></script>
</body>
</html>
