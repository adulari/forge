# Fly.io app config for forge-relay (ADR-0012). Deploy from the WORKSPACE ROOT so the Dockerfile
# can see the whole workspace: `fly deploy --config crates/forge-relay/fly.toml --dockerfile
# crates/forge-relay/Dockerfile .` (context = repo root, not this directory).
app = "forge-relay"
primary_region = "ams"  # Amsterdam — closest to the operator; adjust if latency matters later.

[build]
  dockerfile = "crates/forge-relay/Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
