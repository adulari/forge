# Place these locations in the TLS server for forge.adulari.dev. If Cloudflare is in front,
# configure nginx's realip module with Cloudflare's published CIDRs so $remote_addr is the real
# client; direct-origin requests then retain their actual source address.

location = /relay/health {
    proxy_pass http://127.0.0.1:8787/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP "";
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
}

location /relay/ {
    # Older clients put the APNs token in the URL; never let it enter a log.
    access_log off;
    error_log /var/log/nginx/forge-relay-error.log crit;
    limit_except POST { deny all; }

    proxy_pass http://127.0.0.1:8787/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP "";
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
    client_max_body_size 4k;
}
