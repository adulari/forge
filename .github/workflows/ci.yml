name: CI

on:
  # No `push: branches: [main]` trigger: every merge to main goes through a PR (squash-merged via
  # `gh pr merge --auto`), so `pull_request` already validated the exact same tree before merge —
  # a push-triggered rerun on the post-squash commit would just repeat that same check for free.
  pull_request:
    branches: [main]
  # Exempt from GitHub's GITHUB_TOKEN anti-recursion guard (unlike push/pull_request), so
  # release.yml can manually dispatch a real "CI" run against its bot-opened brew-formula PR
  # branch — that PR's own `pull_request` event never fires one, since it's opened with GITHUB_TOKEN.
  workflow_dispatch:
  # Weekly full verification stays on the self-hosted Arch Linux runner. Cross-platform release
  # compilation remains in the tag workflows, where those platform-native runners are required.
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  anywhere-policy:
    name: anywhere plaintext-canary harness
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: bash scripts/ci/test-anywhere-plaintext-canary.sh

  fmt:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path vendor/genai-0.6.5/Cargo.toml -- --check

  clippy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
      # No Swatinem/rust-cache here: this is a persistent self-hosted runner whose `target/`
      # already survives on local disk between jobs — restoring/saving a cache over the network
      # would be pure overhead on top of an already-warm build dir.
      # `--locked` fails if Cargo.lock is out of sync with Cargo.toml. Without it, a version bump
      # that forgets to refresh the lock (e.g. `cargo update -p forge` — a no-op, the root crate is
      # forge-cli) sails through every PR and only blows up at release time, where the build DOES use
      # `--locked` (cost us a failed v0.4.42 release). Catch the drift here, on every PR.
      - run: cargo clippy --locked --all-targets --all-features
      - run: cargo clippy --locked --manifest-path vendor/genai-0.6.5/Cargo.toml --all-targets -- -D warnings

  test:
    name: test (archlinux)
    # 'heavy' = archlinux-1 only: workspace-wide compiles are the box's big memory consumers —
    # serializing them on one 12G-capped runner keeps concurrent PRs from OOMing the host
    # (30G machine; three 8G runners compiling at once repeatedly killed all runner services).
    runs-on: [self-hosted, linux, x64, heavy]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - run: cargo test --locked --all --all-features
      - run: cargo test --locked --manifest-path vendor/genai-0.6.5/Cargo.toml

  # Release-profile + `--locked` smoke on one platform. The release workflow builds with
  # `--release --locked`, and breakages there (LTO-only failures, a Cargo.lock that drifted from
  # Cargo.toml) surface only at tag time otherwise — exactly what failed v0.4.42's first release.
  # Catch it on every PR. One platform keeps it cheap; the `lto = "thin"` link runs once.
  release-build:
    # See `test` above: heavy jobs serialize on the one heavy runner.
    runs-on: [self-hosted, linux, x64, heavy]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - run: cargo build --release --locked --bin forge
      - name: Verify upgrade, reconnect, and rollback from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-upgrade-e2e.sh "" target/release/forge

  CI:
    needs: [anywhere-policy, fmt, clippy, test, release-build]
    if: always()
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.anywhere-policy.result }}" != success \
             || "${{ needs.fmt.result }}" != success \
             || "${{ needs.clippy.result }}" != success \
             || "${{ needs.test.result }}" != success \
             || "${{ needs.release-build.result }}" != success ]]; then
            echo "One or more required jobs failed, were cancelled, or were skipped"
            exit 1
          fi
          echo "All jobs passed"
