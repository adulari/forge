name: CI

on:
  # No `push: branches: [main]` trigger: every merge to main goes through a PR (squash-merged via
  # `gh pr merge --auto`), so `pull_request` already validated the exact same tree before merge —
  # a push-triggered rerun on the post-squash commit would just repeat that same check for free.
  pull_request:
    branches: [main]
  # Exempt from GitHub's GITHUB_TOKEN anti-recursion guard (unlike push/pull_request), so
  # release.yml can manually dispatch a real "CI" run against its bot-opened brew-formula PR
  # branch — that PR's own `pull_request` event never fires one, since it's opened with GITHUB_TOKEN.
  workflow_dispatch:
  # Weekly full verification stays on the self-hosted Arch Linux runner. Cross-platform release
  # compilation remains in the tag workflows, where those platform-native runners are required.
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUSTFLAGS: "-D warnings"

jobs:
  changes:
    name: detect affected jobs
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    outputs:
      rust_fmt: ${{ steps.classify.outputs.rust_fmt }}
      rust: ${{ steps.classify.outputs.rust }}
      release_build: ${{ steps.classify.outputs.release_build }}
      anywhere_policy: ${{ steps.classify.outputs.anywhere_policy }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/changed-groups.sh
      - name: Test EAS OTA safety classifier
        run: bash scripts/ci/test-eas-ota-safety.sh
      - name: Test runner resource budgets
        run: bash scripts/ci/test-runner-resource-budget.sh

  anywhere-policy:
    name: anywhere plaintext-canary harness
    needs: changes
    if: needs.changes.outputs.anywhere_policy == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: bash scripts/ci/test-anywhere-plaintext-canary.sh

  fmt:
    needs: changes
    if: needs.changes.outputs.rust_fmt == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path vendor/genai-0.6.5/Cargo.toml -- --check

  clippy:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # Serialize every workspace-wide Rust compile on archlinux-1. Running clippy beside the
    # test/release/Tauri builds exhausted host swap and hard-froze the workstation.
    runs-on: [self-hosted, linux, x64, heavy]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
      # No Swatinem/rust-cache here: this is a persistent self-hosted runner whose `target/`
      # already survives on local disk between jobs — restoring/saving a cache over the network
      # would be pure overhead on top of an already-warm build dir.
      # `--locked` fails if Cargo.lock is out of sync with Cargo.toml. Without it, a version bump
      # that forgets to refresh the lock (e.g. `cargo update -p forge` — a no-op, the root crate is
      # forge-cli) otherwise blows up only at release time, where the build DOES use `--locked`
      # (cost us a failed v0.4.42 release). Catch the drift on every affected Rust PR.
      - run: cargo clippy --locked --all-targets --all-features
      - run: cargo clippy --locked --manifest-path vendor/genai-0.6.5/Cargo.toml --all-targets -- -D warnings

  test:
    name: test (archlinux)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    # 'heavy' = archlinux-1 only: workspace-wide compiles are the box's big memory consumers —
    # serializing them on one 12G-capped runner keeps concurrent PRs from OOMing the host
    # (30G machine; three 8G runners compiling at once repeatedly killed all runner services).
    runs-on: [self-hosted, linux, x64, heavy]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - run: cargo test --locked --all --all-features
      - run: cargo test --locked --manifest-path vendor/genai-0.6.5/Cargo.toml

  # Release-profile + `--locked` smoke on one platform. The release workflow builds with
  # `--release --locked`, and breakages there (LTO-only failures, a Cargo.lock that drifted from
  # Cargo.toml) surface only at tag time otherwise — exactly what failed v0.4.42's first release.
  # Catch it on every affected Rust PR. One platform keeps it cheap; the `lto = "thin"` link runs once.
  release-build:
    needs: changes
    if: needs.changes.outputs.release_build == 'true'
    # See `test` above: heavy jobs serialize on the one heavy runner.
    runs-on: [self-hosted, linux, x64, heavy]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - run: cargo build --release --locked --bin forge
      - name: Verify upgrade, reconnect, and rollback from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release-upgrade-e2e.sh "" target/release/forge

  CI:
    needs: [changes, anywhere-policy, fmt, clippy, test, release-build]
    if: always()
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed
        run: |
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.anywhere-policy.result }}" \
            "${{ needs.fmt.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.release-build.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "A required CI job failed or was cancelled"; exit 1 ;;
            esac
          done
          echo "All affected CI jobs passed"
