name: eas-update

# Publishes an EAS Update (OTA) to the `production` channel on every push to main that
# touches OTA-safe JS or assets. Ships JS + assets only — no native code, no new
# binary. The installed app checks for + applies the update on launch and foreground
# (mobile/src/lib/useOtaUpdates.ts), gated by a runtimeVersion fingerprint so an OTA
# update is only offered to binaries whose native layer matches.
#
# `--platform ios` is REQUIRED: the app has native-only modules (live-activity Swift
# target + expo-audio voice) whose config plugin breaks the web bundle export, so
# letting eas-cli default to exporting every platform would fail the whole publish.
#
# Requires the `EXPO_TOKEN` repo secret (Expo access token) for authentication:
# https://docs.expo.dev/accounts/programmatic-access

on:
  push:
    branches:
      - main
    paths:
      - "mobile/src/**"
      - "mobile/assets/**"
  # Main-only manual recovery when an automatic publish did not run or failed (see
  # RELEASING.md §6). The runtimeVersion fingerprint still gates delivery, so a dispatch
  # only reaches binaries whose native layer matches — never dispatch from a topic branch.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: eas update (production / ios)
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # The guard compares the complete push range so a commit that mixes OTA-safe
          # files with native/config files cannot publish an incompatible update.
          fetch-depth: 0

      - name: Guard OTA-safe diff
        id: guard
        working-directory: .
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Manual recovery (RELEASING.md §6) has no push range to diff — and "current main since
          # the last release" always contains OTA-neutral non-mobile commits (version bump, this
          # workflow), which the range diff would wrongly flag as native. The real delivery gate is
          # the IOS_OTA_RUNTIME_VERSION pin below: an update only reaches binaries whose native
          # runtime matches, so a stale native layer never receives it. Operator ensures a matching
          # native build exists before dispatching.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — range diff skipped; delivery gated by IOS_OTA_RUNTIME_VERSION."
            exit 0
          fi

          # Push events carry github.event.before; the all-zeros sentinel (and any empty value)
          # falls back to the pushed commit's parent.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse "$AFTER^" 2>/dev/null || printf '%s' "$AFTER")"
          fi

          unsafe=()
          while IFS= read -r path; do
            case "$path" in
              mobile/src/*|mobile/assets/*) ;;
              *) unsafe+=("$path") ;;
            esac
          done <<< "$(git diff --name-only "$BEFORE" "$AFTER")"

          if ((${#unsafe[@]})); then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            printf 'Native/config changes detected; skipping OTA publication:\n%s\n' "${unsafe[*]}"
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
            echo "All changed mobile files are OTA-safe."
          fi

      - name: Skip incompatible OTA
        if: steps.guard.outputs.safe != 'true'
        run: echo 'Skipped; run the required native Xcode Cloud build before publishing an update.'

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        if: steps.guard.outputs.safe == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.safe == 'true'
        run: npm ci

      - name: Require the installed archive runtime
        if: steps.guard.outputs.safe == 'true'
        env:
          RUNTIME: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
        run: test -n "$RUNTIME" || { echo 'Set the IOS_OTA_RUNTIME_VERSION repository variable from the installed Xcode archive fingerprint.'; exit 1; }

      - name: Publish EAS Update (production channel, iOS only)
        if: steps.guard.outputs.safe == 'true'
        run: |
          # Isolate Metro's cache per run. These are persistent self-hosted runners where the
          # default os.tmpdir() cache (/tmp/metro-cache) is shared across runs and runner users;
          # `expo export --clear` then fails to rmdir a dir another user created (EACCES), which
          # silently left production on an older OTA. $RUNNER_TEMP is per-run and owned by this
          # job, so pointing TMPDIR there gives Metro a private, always-clearable cache.
          export TMPDIR="$RUNNER_TEMP/metro"
          mkdir -p "$TMPDIR"
          npx eas-cli@latest update \
            --channel production \
            --environment production \
            --platform ios \
            --message "$(git log -1 --pretty='%h %s')" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          EXPO_RUNTIME_VERSION_OVERRIDE: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
          # Cap Metro transform workers: unbounded fan-out on the memory-constrained
          # self-hosted runner exhausts RAM during bundling and freezes it (job lost
          # at ~600s, empty logs). Read by mobile/metro.config.js.
          METRO_MAX_WORKERS: "2"
