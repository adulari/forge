name: eas-update

# Publishes an EAS Update (OTA) to the `production` channel on every push to main that
# touches OTA-safe JS or assets. Ships JS + assets only — no native code, no new
# binary. The installed app checks for + applies the update on launch and foreground
# (mobile/src/lib/useOtaUpdates.ts), gated by a runtimeVersion fingerprint so an OTA
# update is only offered to binaries whose native layer matches.
#
# `--platform ios` is REQUIRED: the app has native-only modules (live-activity Swift
# target + expo-audio voice) whose config plugin breaks the web bundle export, so
# letting eas-cli default to exporting every platform would fail the whole publish.
#
# Requires the `EXPO_TOKEN` repo secret (Expo access token) for authentication:
# https://docs.expo.dev/accounts/programmatic-access

on:
  # Recovery/manual publication from main. The compatibility-baseline guard below applies to both
  # automatic and manual runs; a manual dispatch cannot bypass native-layer review.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/src/**"
      - "mobile/assets/**"
  # Main-only manual recovery when an automatic publish did not run or failed (see
  # RELEASING.md §6). The runtimeVersion fingerprint still gates delivery, so a dispatch
  # only reaches binaries whose native layer matches — never dispatch from a topic branch.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: eas update (production / ios)
    runs-on: [release, linux, x64]
    timeout-minutes: 45
    environment: production-ota
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The guard compares the complete push range so a commit that mixes OTA-safe
          # files with native/config files cannot publish an incompatible update.
          fetch-depth: 0

      - name: Guard OTA-safe diff
        id: guard
        working-directory: .
        env:
          BASELINE: ${{ vars.IOS_OTA_COMPATIBLE_BASE_SHA }}
        run: |
          set -euo pipefail
          [ "${{ github.ref }}" = refs/heads/main ] || {
            echo 'Production OTA publication is allowed only from main.' >&2
            exit 1
          }
          [[ "$BASELINE" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'Set IOS_OTA_COMPATIBLE_BASE_SHA to the reviewed commit compatible with the installed archive.' >&2
            exit 1
          }
          git cat-file -e "$BASELINE^{commit}" 2>/dev/null || {
            echo "OTA compatibility baseline is not in repository history: $BASELINE" >&2
            exit 1
          }
          git merge-base --is-ancestor "$BASELINE" HEAD || {
            echo "OTA compatibility baseline is not an ancestor of HEAD: $BASELINE" >&2
            exit 1
          }

          unsafe=()
          while IFS= read -r path; do
            case "$path" in
              # Bundled JS/assets are the OTA payload. Documentation, tests, Android EAS config,
              # and the independent Tauri shell cannot alter the installed iOS native runtime.
              mobile/src/*|mobile/assets/*|mobile/*.md|mobile/.gitignore|mobile/redesign/*|mobile/src-tauri/*|mobile/eas.json) ;;
              mobile/*) unsafe+=("$path") ;;
              *) ;; # non-mobile changes are irrelevant to iOS runtime compatibility
            esac
          done <<< "$(git diff --name-only "$BASELINE" HEAD)"

          if ((${#unsafe[@]})); then
            printf 'Unreviewed iOS native/config changes since %s; refusing OTA publication:\n' "$BASELINE" >&2
            printf -- '- %s\n' "${unsafe[@]}" >&2
            exit 1
          fi
          echo "safe=true" >> "$GITHUB_OUTPUT"
          echo "All changes since the installed-runtime baseline are OTA-compatible."

      - name: Prepare isolated Metro cache
        if: steps.guard.outputs.safe == 'true'
        run: |
          # Metro defaults to one host-global /tmp/metro-cache. Multiple persistent self-hosted
          # runners use different Unix users, so one run can otherwise leave entries the next user
          # cannot clear. Keep all temporary/cache state private to this run and export it to every
          # subsequent step.
          tmp="$RUNNER_TEMP/forge-eas-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$tmp"
          echo "TMPDIR=$tmp" >> "$GITHUB_ENV"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        if: steps.guard.outputs.safe == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.safe == 'true'
        run: npm ci

      - name: Require the installed archive runtime
        if: steps.guard.outputs.safe == 'true'
        env:
          RUNTIME: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
        run: test -n "$RUNTIME" || { echo 'Set the IOS_OTA_RUNTIME_VERSION repository variable from the installed Xcode archive fingerprint.'; exit 1; }

      - name: Publish EAS Update (production channel, iOS only)
        if: steps.guard.outputs.safe == 'true'
        run: |
          test -n "$EXPO_TOKEN" || { echo 'EXPO_TOKEN is not configured' >&2; exit 1; }
          ./node_modules/.bin/eas update \
            --channel production \
            --environment production \
            --platform ios \
            --message "$(git log -1 --pretty='%h %s')" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          EXPO_RUNTIME_VERSION_OVERRIDE: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
