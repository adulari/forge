name: eas-update

# Publishes an EAS Update (OTA) to the `production` channel on every push to main that
# touches OTA-safe JS or assets. Ships JS + assets only — no native code, no new
# binary. The installed app checks for + applies the update on launch and foreground
# (mobile/src/lib/useOtaUpdates.ts), gated by a runtimeVersion fingerprint so an OTA
# update is only offered to binaries whose native layer matches.
#
# `--platform ios` is REQUIRED: the app has native-only modules (live-activity Swift
# target + expo-audio voice) whose config plugin breaks the web bundle export, so
# letting eas-cli default to exporting every platform would fail the whole publish.
#
# Requires the `EXPO_TOKEN` repo secret (Expo access token) for authentication:
# https://docs.expo.dev/accounts/programmatic-access

on:
  push:
    branches:
      - main
    paths:
      - "mobile/src/**"
      - "mobile/assets/**"

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: eas update (production / ios)
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # The guard compares the complete push range so a commit that mixes OTA-safe
          # files with native/config files cannot publish an incompatible update.
          fetch-depth: 0

      - name: Guard OTA-safe diff
        id: guard
        working-directory: .
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse "$AFTER^" 2>/dev/null || printf '%s' "$AFTER")"
          fi

          unsafe=()
          while IFS= read -r path; do
            case "$path" in
              mobile/src/*|mobile/assets/*) ;;
              *) unsafe+=("$path") ;;
            esac
          done <<< "$(git diff --name-only "$BEFORE" "$AFTER")"

          if ((${#unsafe[@]})); then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            printf 'Native/config changes detected; skipping OTA publication:\n%s\n' "${unsafe[*]}"
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
            echo "All changed mobile files are OTA-safe."
          fi

      - name: Skip incompatible OTA
        if: steps.guard.outputs.safe != 'true'
        run: echo 'Skipped; run the required native Xcode Cloud build before publishing an update.'

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        if: steps.guard.outputs.safe == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.safe == 'true'
        run: npm ci

      - name: Require the installed archive runtime
        if: steps.guard.outputs.safe == 'true'
        env:
          RUNTIME: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
        run: test -n "$RUNTIME" || { echo 'Set the IOS_OTA_RUNTIME_VERSION repository variable from the installed Xcode archive fingerprint.'; exit 1; }

      - name: Publish EAS Update (production channel, iOS only)
        if: steps.guard.outputs.safe == 'true'
        run: |
          npx eas-cli@latest update \
            --channel production \
            --environment production \
            --platform ios \
            --message "$(git log -1 --pretty='%h %s')" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          EXPO_RUNTIME_VERSION_OVERRIDE: ${{ vars.IOS_OTA_RUNTIME_VERSION }}
