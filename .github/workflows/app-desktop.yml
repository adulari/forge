name: app-desktop

# 3-OS Tauri v2 desktop build of the unified app.
# Bundles are uploaded to the tagged GitHub Release as well as retained as workflow artifacts.

on:
  push:
    tags:
      - "app-v*"
      - "v*"
  workflow_dispatch:

concurrency:
  group: app-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: ubuntu-24.04-arm
            name: linux-aarch64
          - os: macos-latest
            name: macos-aarch64
          - os: macos-latest
            name: macos-x86_64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # Tauri v2 Linux prerequisites (webkit2gtk + appindicator + rsvg + patchelf for
      # AppImage bundling). macOS (WKWebView) and Windows (WebView2) runners need nothing extra.
      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "mobile/src-tauri -> target"
          key: ${{ matrix.os }}

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build desktop bundle
        working-directory: mobile
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then echo 'desktop updater signing enabled'; else echo 'LOUD: TAURI signing secrets unset; building unsigned desktop bundles'; fi
          npm run tauri:build

      - name: Normalize release asset names
        shell: bash
        working-directory: mobile
        run: |
          mkdir -p release-assets
          case "${{ matrix.name }}" in
            linux-x86_64) cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/Forge-desktop-linux-x86_64.AppImage; cp src-tauri/target/release/bundle/deb/*.deb release-assets/Forge-desktop-linux-x86_64.deb ;;
            linux-aarch64) cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/Forge-desktop-linux-aarch64.AppImage; cp src-tauri/target/release/bundle/deb/*.deb release-assets/Forge-desktop-linux-aarch64.deb ;;
            macos-aarch64) cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/Forge-desktop-macos-aarch64.dmg ;;
            macos-x86_64) cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/Forge-desktop-macos-x86_64.dmg ;;
            windows-x86_64) cp src-tauri/target/release/bundle/nsis/*.exe release-assets/Forge-desktop-windows-x86_64.nsis.exe ;;
          esac

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: forge-desktop-${{ matrix.name }}
          path: mobile/release-assets/**
          if-no-files-found: error

      - name: Publish tagged desktop bundles
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: mobile/release-assets/*
          fail_on_unmatched_files: false
