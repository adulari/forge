name: app-desktop

# 3-OS Tauri v2 desktop build of the unified app.
# Bundles are uploaded to the tagged GitHub Release as well as retained as workflow artifacts.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to repair/publish (leave blank for an artifact-only build)
        required: false
        type: string

concurrency:
  group: app-desktop-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: app preflight
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_tag != '' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0
      - name: Verify release source provenance
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        shell: bash
        working-directory: .
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^(app-)?v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release_tag must look like v2.6.6 or app-v2.6.6" >&2
            exit 1
          }
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || {
            echo "release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          }
          tag_sha="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          head_sha="$(git rev-parse HEAD)"
          [ "$head_sha" = "$tag_sha" ] || {
            echo "checked-out source $head_sha does not match $RELEASE_TAG ($tag_sha)" >&2
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "release tag is not reachable from origin/main" >&2
            exit 1
          }
          if [[ "$RELEASE_TAG" == v* ]]; then
            cargo_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
            [ "$RELEASE_TAG" = "v$cargo_version" ] || {
              echo "unified desktop tag $RELEASE_TAG does not match workspace version $cargo_version" >&2
              exit 1
            }
          fi
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run check

  build:
    name: build (${{ matrix.os }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [release, linux, x64, heavy]
            name: linux-x86_64
          - os: ubuntu-24.04-arm
            name: linux-aarch64
          - os: macos-latest
            name: macos-aarch64
          - os: macos-latest
            name: macos-x86_64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.release_tag != '' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}

      # Tauri v2 Linux prerequisites (webkit2gtk + appindicator + rsvg + patchelf for
      # AppImage bundling). macOS (WKWebView) and Windows (WebView2) runners need nothing extra.
      - name: Install Linux webview deps
        if: matrix.name == 'linux-aarch64'
        run: |
          # ports.ubuntu.com occasionally drops ARM runner connections. Apt's bounded retry and
          # IPv4 fallback keep a transient mirror failure from invalidating an otherwise healthy
          # five-platform release (v2.6.4 lost latest.json this way).
          sudo apt-get -o Acquire::Retries=4 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=4 -o Acquire::ForceIPv4=true install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            xdg-utils

      - name: Prepare Arch Linux webview deps
        if: matrix.name == 'linux-x86_64'
        run: |
          set -euo pipefail
          # The runner account deliberately has no passwordless sudo. Keep heavyweight system
          # libraries in the runner image, and fetch the two leaf build tools into RUNNER_TEMP
          # when absent instead of making release builds depend on interactive root access.
          for package in pkgconf webkit2gtk-4.1 libayatana-appindicator librsvg base-devel curl wget file openssl squashfs-tools; do
            pacman -Q "$package" >/dev/null || {
              echo "missing required runner package: $package" >&2
              exit 1
            }
          done

          tool_root="$RUNNER_TEMP/forge-arch-tools"
          rm -rf "$tool_root"
          mkdir -p "$tool_root"
          # The runner image should eventually carry these two leaf tools. Until then, use immutable
          # Arch Archive package versions and fail closed on their reviewed SHA-256 digests; never
          # execute whatever a moving /download endpoint happens to serve.
          while read -r package url sha256; do
            pacman -Q "$package" >/dev/null 2>&1 && continue
            archive="$RUNNER_TEMP/${url##*/}"
            curl --fail --silent --show-error --location "$url" --output "$archive"
            printf '%s  %s\n' "$sha256" "$archive" | sha256sum --check --status || {
              echo "checksum mismatch for pinned Arch package: $package" >&2
              exit 1
            }
            bsdtar -x -C "$tool_root" -f "$archive"
          done <<'PACKAGES'
          patchelf https://archive.archlinux.org/packages/p/patchelf/patchelf-0.19.1-1-x86_64.pkg.tar.zst 5efa147d88f6d8fc40cd190e367ac5ff3898e77736cbf68d8779872e4589c6a8
          xdotool https://archive.archlinux.org/packages/x/xdotool/xdotool-4.20260303.1-1-x86_64.pkg.tar.zst e215cac06133496d8ecd3ac7e456cacffed69fc52d28485891d346f7a15edcba
          PACKAGES

          # Relocate libxdo's absolute system paths to the temporary package root.
          if [ -f "$tool_root/usr/lib/pkgconfig/libxdo.pc" ]; then
            sed -i \
              -e "s|^libdir=/usr/lib$|libdir=$tool_root/usr/lib|" \
              -e "s|^includedir=/usr/include$|includedir=$tool_root/usr/include|" \
              "$tool_root/usr/lib/pkgconfig/libxdo.pc"
          fi
          echo "$tool_root/usr/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$tool_root/usr/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$tool_root/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

          export PATH="$tool_root/usr/bin:$PATH"
          export PKG_CONFIG_PATH="$tool_root/usr/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          for package in webkit2gtk-4.1 ayatana-appindicator3-0.1 librsvg-2.0; do
            pkg-config --exists "$package" || {
              echo "missing required pkg-config module: $package" >&2
              exit 1
            }
          done
          command -v patchelf >/dev/null
          pkg-config --exists libxdo

          # AppImageLauncher registers a host-wide binfmt handler that breaks linuxdeploy's
          # nested appimage output plugin on this headless runner (its mounted AppRun vanishes
          # with exit 127). Pre-extract that plugin and leave a script at the cache path Tauri
          # expects, so linuxdeploy invokes the extracted AppRun without touching binfmt/FUSE.
          tauri_cache="${XDG_CACHE_HOME:-$HOME/.cache}/tauri"
          plugin="$tauri_cache/linuxdeploy-plugin-appimage.AppImage"
          plugin_root="$tauri_cache/linuxdeploy-plugin-appimage-root"
          plugin_download="$RUNNER_TEMP/linuxdeploy-plugin-appimage.AppImage"
          mkdir -p "$tauri_cache"
          curl --fail --silent --show-error --location \
            'https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage' \
            --output "$plugin_download"
          printf '%s  %s\n' \
            '1da16a46fa5e058ae740e7c35ed0d36d86cb869ac9cc8a5fd9a1847d7978d99a' \
            "$plugin_download" | sha256sum --check --status || {
            echo 'checksum mismatch for pinned linuxdeploy AppImage plugin' >&2
            exit 1
          }
          mapfile -t squashfs_offsets < <(python3 - "$plugin_download" <<'PY'
          from pathlib import Path
          import sys

          data = Path(sys.argv[1]).read_bytes()
          start = 0
          while (offset := data.find(b"hsqs", start)) >= 0:
              print(offset)
              start = offset + 1
          PY
          )
          squashfs_offset=""
          for candidate in "${squashfs_offsets[@]}"; do
            if unsquashfs -s -o "$candidate" "$plugin_download" >/dev/null 2>&1; then
              squashfs_offset="$candidate"
              break
            fi
          done
          [[ -n "$squashfs_offset" ]] || {
            echo 'could not locate appimage plugin squashfs payload' >&2
            exit 1
          }
          rm -rf "$plugin_root"
          unsquashfs -q -f -d "$plugin_root" -o "$squashfs_offset" "$plugin_download"
          cat > "$plugin" <<'SH'
          #!/usr/bin/env bash
          exec "${FORGE_LINUXDEPLOY_PLUGIN_ROOT:?}/AppRun" "$@"
          SH
          chmod 0755 "$plugin"
          echo "FORGE_LINUXDEPLOY_PLUGIN_ROOT=$plugin_root" >> "$GITHUB_ENV"

          # linuxdeploy bundles an older strip that cannot parse Arch's modern .relr.dyn
          # sections. Forge itself is already stripped; dependency stripping is optional.
          echo 'NO_STRIP=1' >> "$GITHUB_ENV"
          FORGE_LINUXDEPLOY_PLUGIN_ROOT="$plugin_root" "$plugin" --plugin-api-version >/dev/null

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: ${{ matrix.name == 'macos-x86_64' && 'x86_64-apple-darwin' || '' }}

      - if: matrix.name != 'linux-x86_64'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: "mobile/src-tauri -> target"
          key: ${{ matrix.os }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # The Tauri updater compares the app's built-in version against latest.json's version (which
      # the updater job below derives from the release tag). If they differ, the app thinks an
      # update is perpetually available, "updates" to a bundle that still reports the old version,
      # and loops. On a tag build, stamp the app version to the tag so built == manifest.
      - name: Sync desktop app version to release tag
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        working-directory: mobile
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^(app-)?v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release_tag must look like v2.6.5 or app-v2.6.5" >&2
            exit 1
          }
          VERSION="${RELEASE_TAG#app-v}"
          VERSION="${VERSION#v}"
          node -e "const fs=require('fs'),f='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')" "$VERSION"
          echo "desktop app version stamped to $VERSION"

      - name: Build desktop bundle
        working-directory: mobile
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: |
          if starts_release='${{ startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' }}'; [ "$starts_release" = true ] && [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo 'TAURI_SIGNING_PRIVATE_KEY is required for a published desktop update' >&2
            exit 1
          fi
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then echo 'desktop updater signing enabled'; else echo 'artifact-only desktop build without updater signing'; fi
          if [ "${{ matrix.name }}" = macos-x86_64 ]; then
            npm run tauri:build -- --ci --target x86_64-apple-darwin -- --locked
          else
            npm run tauri:build -- --ci -- --locked
          fi

      - name: Normalize release asset names
        shell: bash
        working-directory: mobile
        run: |
          mkdir -p release-assets
          root=src-tauri/target/release
          [ "${{ matrix.name }}" = macos-x86_64 ] && root=src-tauri/target/x86_64-apple-darwin/release || true
          case "${{ matrix.name }}" in
            linux-x86_64) cp "$root/bundle/appimage/"*.AppImage release-assets/Forge-desktop-linux-x86_64.AppImage; cp "$root/bundle/appimage/"*.AppImage.sig release-assets/Forge-desktop-linux-x86_64.AppImage.sig; cp "$root/bundle/deb/"*.deb release-assets/Forge-desktop-linux-x86_64.deb ;;
            linux-aarch64) cp "$root/bundle/appimage/"*.AppImage release-assets/Forge-desktop-linux-aarch64.AppImage; cp "$root/bundle/appimage/"*.AppImage.sig release-assets/Forge-desktop-linux-aarch64.AppImage.sig; cp "$root/bundle/deb/"*.deb release-assets/Forge-desktop-linux-aarch64.deb ;;
            macos-aarch64) cp "$root/bundle/macos/"*.app.tar.gz release-assets/Forge-desktop-macos-aarch64.app.tar.gz; cp "$root/bundle/macos/"*.app.tar.gz.sig release-assets/Forge-desktop-macos-aarch64.app.tar.gz.sig; cp "$root/bundle/dmg/"*.dmg release-assets/Forge-desktop-macos-aarch64.dmg ;;
            macos-x86_64) cp "$root/bundle/macos/"*.app.tar.gz release-assets/Forge-desktop-macos-x86_64.app.tar.gz; cp "$root/bundle/macos/"*.app.tar.gz.sig release-assets/Forge-desktop-macos-x86_64.app.tar.gz.sig; cp "$root/bundle/dmg/"*.dmg release-assets/Forge-desktop-macos-x86_64.dmg ;;
            windows-x86_64) cp "$root/bundle/nsis/"*.exe release-assets/Forge-desktop-windows-x86_64.nsis.exe; cp "$root/bundle/nsis/"*.exe.sig release-assets/Forge-desktop-windows-x86_64.nsis.exe.sig ;;
          esac

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: forge-desktop-${{ matrix.name }}
          path: mobile/release-assets/**
          if-no-files-found: error

  updater:
    name: validate and publish desktop release
    needs: build
    # Run even when a matrix adapter failed so the release gets one explicit transactional
    # verdict instead of silently skipping latest.json after partially publishing bundles.
    if: always() && (startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '')
    runs-on: [release, linux, x64]
    timeout-minutes: 30
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: forge-desktop-*
          path: assets
          merge-multiple: true
      - name: Generate latest.json
        env:
          VERSION: ${{ inputs.release_tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, pathlib, datetime
          root = pathlib.Path('assets')
          names = {
            'darwin-aarch64': 'Forge-desktop-macos-aarch64.app.tar.gz',
            'darwin-x86_64': 'Forge-desktop-macos-x86_64.app.tar.gz',
            'linux-x86_64': 'Forge-desktop-linux-x86_64.AppImage',
            'linux-aarch64': 'Forge-desktop-linux-aarch64.AppImage',
            'windows-x86_64': 'Forge-desktop-windows-x86_64.nsis.exe',
          }
          platforms = {}
          missing = []
          for platform, filename in names.items():
            path = root / filename
            sig = pathlib.Path(str(path) + '.sig')
            if not path.is_file() or not sig.is_file() or not sig.read_text().strip():
              missing.append(f'{platform}: {filename} + signature')
              continue
            platforms[platform] = {
              'url': f"https://github.com/{os.environ['REPO']}/releases/download/{os.environ['VERSION']}/{filename}",
              'signature': sig.read_text().strip(),
            }
          if missing:
            raise SystemExit('desktop publication aborted; incomplete signed platform set:\n- ' + '\n- '.join(missing))
          tag = os.environ['VERSION']
          version = tag.removeprefix('app-v').removeprefix('v')
          manifest = {'version': version, 'notes': 'Forge desktop update', 'pub_date': datetime.datetime.now(datetime.timezone.utc).isoformat(), 'platforms': platforms}
          pathlib.Path('latest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY
      - name: Generate desktop checksums
        run: |
          cd assets
          sha256sum * > ../desktop-checksums.txt
      - name: Attest desktop release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            assets/*
            latest.json
            desktop-checksums.txt
      - name: Publish complete desktop release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            assets/*
            latest.json
            desktop-checksums.txt
          fail_on_unmatched_files: true
          # Only unified CLI + desktop v* releases own GitHub's Latest pointer. app-v* repair or
          # preview releases must never break CLI installers or the desktop updater endpoint.
          make_latest: ${{ startsWith(inputs.release_tag || github.ref_name, 'v') }}
      - name: Verify updater is publicly readable
        env:
          VERSION: ${{ inputs.release_tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          url="https://github.com/${REPO}/releases/download/${VERSION}/latest.json"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --location "$url" -o published-latest.json; then
              python -c 'import json; p=json.load(open("published-latest.json")); assert len(p["platforms"]) == 5'
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "updater health check failed: $url" >&2
          exit 1
