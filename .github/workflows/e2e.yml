name: e2e

# Real-turn cross-platform E2E. Runs the headless `forge run` against a real provider on
# Windows + Ubuntu + macOS so cross-platform behaviour (bridge launch, PATH, clipboard, keyring,
# routing) is exercised on a REAL Windows box — which we can't run locally without a VM. Also runs
# the probing `forge doctor` on each OS and uploads its output, so a maintainer with no Windows
# machine can diagnose breakage from the logs.
#
# Manual (Actions tab → e2e → Run workflow), or weekly. Set:
#   - Repo VARIABLE  E2E_MODEL   e.g. groq::llama-3.1-8b-instant   (the model to pin for the turn)
#   - Repo SECRET    matching the provider, any of: GROQ_API_KEY / OPEN_ROUTER_API_KEY / GEMINI_API_KEY
# A cheap free-tier key (groq/openrouter) is plenty — the turn is one tiny prompt.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catch cross-platform drift weekly

jobs:
  realturn:
    name: real turn (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        # `label` stays a plain string for the artifact/log names below; `runner` is what
        # actually goes to runs-on and differs for the ubuntu leg (self-hosted array vs
        # hosted string) — macOS/Windows stay on their GitHub-hosted runners.
        include:
          - label: ubuntu-latest
            runner: [self-hosted, linux, x64]
          - label: windows-latest
            runner: windows-latest
          - label: macos-latest
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash # bash is present on the Windows runner too — one script for all OSes
    env:
      E2E_MODEL: ${{ vars.E2E_MODEL || 'groq::llama-3.1-8b-instant' }}
      # Provider keys (all optional — set the one matching E2E_MODEL). Forge reads these from env.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      # Ephemeral GitHub-hosted legs have no warm target/ dir, so the cache earns its keep.
      # The self-hosted ubuntu leg skips it: target/ already persists on that box's local disk
      # between runs, so a network cache round-trip would be pure overhead on top of that.
      - if: matrix.label != 'ubuntu-latest'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build forge
        run: cargo build --release --bin forge

      - name: doctor (diagnostics — never fails the job)
        continue-on-error: true
        run: cargo run --release -q --bin forge -- doctor 2>&1 | tee doctor-${{ matrix.label }}.txt

      - name: real turn
        run: |
          set -o pipefail
          echo "model: $E2E_MODEL"
          cargo run --release -q --bin forge -- run \
            "Reply with exactly the single word: PONG" --model "$E2E_MODEL" \
            2>&1 | tee turn-${{ matrix.label }}.txt
          # Fail on the cross-platform failure signatures we care about.
          if grep -qiE "panic|Resolver error|No usable model|provider auth failed|RUST_BACKTRACE" turn-${{ matrix.label }}.txt; then
            echo "::error::real turn produced an error marker on ${{ matrix.label }}"
            exit 1
          fi
          if [ -z "$(tr -d '[:space:]' < turn-${{ matrix.label }}.txt)" ]; then
            echo "::error::real turn produced no output on ${{ matrix.label }}"
            exit 1
          fi

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-${{ matrix.label }}
          path: |
            doctor-${{ matrix.label }}.txt
            turn-${{ matrix.label }}.txt
          if-no-files-found: ignore
