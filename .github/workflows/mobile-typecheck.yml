name: mobile-typecheck

# Classifies every PR, then runs only the affected app and/or Tauri checks. Keeping the workflow
# present on every PR gives branch protection a stable aggregate check even for intentional skips.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: mobile-typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: "4"

jobs:
  changes:
    name: detect affected jobs
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    outputs:
      mobile_app: ${{ steps.classify.outputs.mobile_app }}
      mobile_tauri: ${{ steps.classify.outputs.mobile_tauri }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/changed-groups.sh

  app:
    name: lint, typecheck, and tests
    needs: changes
    if: needs.changes.outputs.mobile_app == 'true'
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check app
        run: npm run check
      - name: Export web app
        run: npx --no-install expo export -p web
        env:
          # Metro defaults to roughly one transform worker per CPU. On the
          # memory-bounded self-hosted runners that exceeds the service cgroup
          # before the export can finish, so use the same proven cap as OTA.
          METRO_MAX_WORKERS: "2"

  tauri:
    name: Tauri tests, clippy, and audit
    needs: changes
    if: needs.changes.outputs.mobile_tauri == 'true'
    runs-on: [self-hosted, linux, x64, heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
      - name: Ensure cargo-audit is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo audit --version 2>/dev/null | grep -q '0.22.2' || cargo install --locked cargo-audit --version 0.22.2
      - run: cargo test --locked --manifest-path mobile/src-tauri/Cargo.toml
      - run: cargo clippy --locked --manifest-path mobile/src-tauri/Cargo.toml --all-targets -- -D warnings
      # Tauri's current Linux webview stack still pins gtk-rs/glib 0.18. RUSTSEC-2024-0429
      # concerns VariantStrIter, which Forge never calls; keep every other vulnerability blocking
      # while upstream completes its GTK dependency migration. Unmaintained GTK3 warnings remain
      # visible without failing because Tauri/Wry still require that stack on Linux.
      - run: cargo audit --file mobile/src-tauri/Cargo.lock --ignore RUSTSEC-2024-0429

  mobile-typecheck:
    name: mobile checks
    needs: [changes, app, tauri]
    if: always()
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - name: Check affected jobs passed
        run: |
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.app.result }}" \
            "${{ needs.tauri.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "An affected mobile job failed or was cancelled"; exit 1 ;;
            esac
          done
          echo "All affected mobile jobs passed"
