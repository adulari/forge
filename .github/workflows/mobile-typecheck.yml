name: mobile-typecheck

# Type-checks the unified app when a PR changes mobile or protocol code. The Rust `CI` workflow
# never compiles TypeScript, so these surfaces retain their own focused checks.
on:
  pull_request:
    paths:
      - "mobile/**"
      - "protocol/**"
  workflow_dispatch:

concurrency:
  group: mobile-typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: lint, typecheck, and tests
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check app
        run: npm run check
      - name: Export web app
        run: npx --no-install expo export -p web

  tauri:
    name: Tauri tests, clippy, and audit
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
      - name: Ensure cargo-audit is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo audit --version 2>/dev/null | grep -q '0.22.2' || cargo install --locked cargo-audit --version 0.22.2
      - run: cargo test --locked --manifest-path mobile/src-tauri/Cargo.toml
      - run: cargo clippy --locked --manifest-path mobile/src-tauri/Cargo.toml --all-targets -- -D warnings
      # Tauri's current Linux webview stack still pins gtk-rs/glib 0.18. RUSTSEC-2024-0429
      # concerns VariantStrIter, which Forge never calls; keep every other vulnerability blocking
      # while upstream completes its GTK dependency migration. Unmaintained GTK3 warnings remain
      # visible without failing because Tauri/Wry still require that stack on Linux.
      - run: cargo audit --file mobile/src-tauri/Cargo.lock --ignore RUSTSEC-2024-0429
