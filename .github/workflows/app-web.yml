name: app-web

# Static web build of the unified app (ARCHITECTURE.md §5, §8 / BUILD_ORDER.md T6.3).
# `expo export -p web` produces a deployable static site (`mobile/dist`) — no server, no
# secrets required. Published as a build artifact on every run; GitHub Pages deploy is
# optional and OFF by default (see the `deploy-pages` job below).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z or app-vX.Y.Z tag to export and attach
        required: false
        type: string

concurrency:
  group: app-web-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  export:
    name: expo export (web)
    runs-on: [release, linux, x64, heavy]
    timeout-minutes: 30
    env:
      EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
      EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_tag != '' && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          fetch-depth: 0

      - name: Verify release source provenance
        if: inputs.release_tag != ''
        working-directory: .
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^(app-)?v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "invalid web release tag: $RELEASE_TAG" >&2
            exit 1
          }
          [ "$(git rev-parse HEAD)" = "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" ] || {
            echo "checked-out source does not match $RELEASE_TAG" >&2
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo 'web release tag is not reachable from origin/main' >&2
            exit 1
          }

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: npm run check

      - name: Export static web build
        run: npx --no-install expo export -p web

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: forge-web-dist
          path: mobile/dist
          if-no-files-found: error

      # Optional Pages deploy, guarded behind a repo variable — OFF unless explicitly enabled.
      # This repository's Pages site currently serves the SideStore manifest, so keep this off
      # unless both payloads are deliberately combined.
      - name: Upload Pages artifact
        if: vars.DEPLOY_WEB_TO_PAGES == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: mobile/dist

  publish:
    name: attach web release asset
    needs: export
    if: inputs.release_tag != ''
    runs-on: [release, linux, x64]
    timeout-minutes: 15
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: forge-web-dist
          path: dist
      - name: Package static web app
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tar -czf "Forge-web-${RELEASE_TAG}.tar.gz" -C dist .
      - name: Attest web release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: Forge-web-${{ inputs.release_tag }}.tar.gz
      - name: Publish static web app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" "Forge-web-${RELEASE_TAG}.tar.gz" \
            --repo "$GITHUB_REPOSITORY" --clobber

  deploy-pages:
    name: publish to GitHub Pages (optional)
    needs: export
    if: vars.DEPLOY_WEB_TO_PAGES == 'true'
    runs-on: [release, linux, x64]
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
