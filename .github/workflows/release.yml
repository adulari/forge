name: release

# Build release binaries for Linux, macOS (Apple Silicon + Intel), and Windows whenever a
# `v*` tag is pushed, and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write # lets the Homebrew-formula step `gh workflow run ci.yml` against the PR branch

jobs:
  # Generate shell completions + the man page ONCE (they're platform-independent text). Runs
  # fully in parallel with `build` below (no `needs` either way) — it used to hard-block every
  # platform build for its own ~6min compile (it links most of forge-cli's dependency graph in
  # release mode just to introspect the clap tree), even though nothing needs its output until
  # `release` assembles the final archives. Driven by `xtasks gen-dist`, which reads forge-cli's
  # clap tree via its library facade — no runtime CLI subcommand.
  assets:
    name: completions + man page
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate completions + man page
        run: cargo run --release -p xtasks -- gen-dist dist-assets
      - uses: actions/upload-artifact@v7
        with:
          name: forge-assets
          path: dist-assets/**
          if-no-files-found: error

  # Raw per-platform binary only — no packaging here. Packaging (bundling README/LICENSE/
  # completions/man page into the final archive) now happens once in `release`, after both this
  # and `assets` finish, so this job has zero dependency on `assets` and starts immediately.
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [self-hosted, linux, x64]
            target: x86_64-unknown-linux-gnu
            self_hosted: true
            bin: forge
          # arm64 stays on GitHub's native-arm runner: the self-hosted x64 box can't build
          # aarch64 natively, and cross-compiling would need a linker that isn't set up. This
          # leg only runs on release tags (rare), so keeping it hosted is cheap and correct.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            self_hosted: false
            bin: forge
          - os: macos-latest
            target: aarch64-apple-darwin
            self_hosted: false
            bin: forge
          - os: macos-latest
            target: x86_64-apple-darwin
            self_hosted: false
            bin: forge
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            self_hosted: false
            bin: forge.exe
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Ephemeral GitHub-hosted legs have no warm target/ dir, so the cache earns its keep.
      # The self-hosted linux leg skips it: target/ already persists on that box's local disk
      # between runs, so a network cache round-trip would be pure overhead on top of that.
      - if: ${{ !matrix.self_hosted }}
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin forge --target ${{ matrix.target }}

      - name: Upload raw binary
        uses: actions/upload-artifact@v7
        with:
          name: forge-raw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: package + publish release
    needs: [assets, build]
    runs-on: [self-hosted, linux, x64]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: forge-assets
          path: dist-assets

      - uses: actions/download-artifact@v8
        with:
          pattern: forge-raw-*
          path: raw

      # Assemble each platform's final archive here (not per-matrix-leg): now that `assets` and
      # `build` run fully in parallel, this is the one place that needs both. Doing it once also
      # collapses the old per-OS bash/pwsh packaging duplication into a single script — a
      # zip/tar.gz archive is just a generic container, it doesn't need to be built on the OS
      # it's targeting.
      - name: Package all platforms
        run: |
          set -e
          declare -A ARCHIVE=(
            [x86_64-unknown-linux-gnu]=tar.gz
            [aarch64-unknown-linux-gnu]=tar.gz
            [aarch64-apple-darwin]=tar.gz
            [x86_64-apple-darwin]=tar.gz
            [x86_64-pc-windows-msvc]=zip
          )
          declare -A BIN=(
            [x86_64-unknown-linux-gnu]=forge
            [aarch64-unknown-linux-gnu]=forge
            [aarch64-apple-darwin]=forge
            [x86_64-apple-darwin]=forge
            [x86_64-pc-windows-msvc]=forge.exe
          )
          mkdir -p dist
          for target in "${!ARCHIVE[@]}"; do
            dir="forge-${target}"
            mkdir "$dir"
            cp "raw/forge-raw-${target}/${BIN[$target]}" "$dir/"
            cp README.md LICENSE "$dir/" 2>/dev/null || true
            cp -r dist-assets/completions "$dir/" 2>/dev/null || true
            cp dist-assets/forge.1 "$dir/" 2>/dev/null || true
            if [ "${ARCHIVE[$target]}" = "zip" ]; then
              zip -r -y "dist/$dir.zip" "$dir"
            else
              tar czf "dist/$dir.tar.gz" "$dir"
            fi
          done
          ls -la dist

      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt 2>/dev/null || sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

      # Keep the Homebrew formula's version + sha256 in step with the release, using THIS release's
      # just-built checksums (no "sha race" against assets that don't exist yet). Opens a PR rather
      # than pushing to main directly, because main is branch-protected (a direct push is rejected,
      # which a continue-on-error step would silently swallow). Best-effort: a hiccup must never fail
      # the release — the same script (scripts/update-brew-formula.sh <version>) is the hand fallback.
      #
      # The PR is opened using GITHUB_TOKEN, so its `pull_request` event does NOT spawn a new
      # workflow run (GitHub's anti-recursion guard on the default token) — the branch-protection-
      # required "CI" check would otherwise never appear on it, leaving `gh pr merge --auto` stuck
      # forever. `workflow_dispatch` is explicitly exempt from that guard, so we manually dispatch
      # ci.yml against the PR branch to get a real "CI" check posted to its head SHA first.
      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" brew-repo
          cd brew-repo
          bash scripts/update-brew-formula.sh "$VERSION" "$GITHUB_WORKSPACE/dist/checksums.txt"
          if git diff --quiet homebrew/forge.rb; then
            echo "formula already current"; exit 0
          fi
          BRANCH="brew/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add homebrew/forge.rb
          git commit -m "chore(brew): update formula to v$VERSION"
          git push -f origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(brew): update formula to v$VERSION" \
            --body "Auto-generated by release.yml after publishing v$VERSION (sha256 from the release's checksums.txt)." \
            || echo "PR already exists"
          gh workflow run ci.yml --ref "$BRANCH" || echo "could not dispatch CI for $BRANCH"
          gh pr merge "$BRANCH" --squash --auto || echo "auto-merge not enabled; merge manually"
