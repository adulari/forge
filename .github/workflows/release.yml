name: release

# From protected `main`, require an existing `v*` tag at the exact workflow-dispatch SHA, build five
# release binaries, attest them, and attach them to the matching GitHub Release.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z tag at the protected-main dispatch SHA
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: verify release provenance
    runs-on: [release, linux, x64, heavy]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 0
      - name: Verify tag matches Cargo version and dispatch SHA
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release tag must look like v2.6.6: $RELEASE_TAG" >&2
            exit 1
          }
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          [ "$RELEASE_TAG" = "v$version" ] || {
            echo "release tag $RELEASE_TAG does not match workspace version $version" >&2
            exit 1
          }
          TAG_SHA="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          [ "$(git rev-parse HEAD)" = "$TAG_SHA" ] || {
            echo "checked-out source does not match $RELEASE_TAG" >&2
            exit 1
          }
          [ "$TAG_SHA" = "$DISPATCH_SHA" ] || {
            echo "release tag $RELEASE_TAG ($TAG_SHA) must equal workflow dispatch SHA $DISPATCH_SHA" >&2
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "release tag is not reachable from origin/main" >&2
            exit 1
          }

  # Generate shell completions + the man page ONCE (they're platform-independent text). Runs
  # fully in parallel with `build` below (no `needs` either way) — it used to hard-block every
  # platform build for its own ~6min compile (it links most of forge-cli's dependency graph in
  # release mode just to introspect the clap tree), even though nothing needs its output until
  # `release` assembles the final archives. Driven by `xtasks gen-dist`, which reads forge-cli's
  # clap tree via its library facade — no runtime CLI subcommand.
  assets:
    name: completions + man page
    needs: preflight
    runs-on: [release, linux, x64, heavy]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/tags/${{ inputs.release_tag }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - name: Generate completions + man page
        run: cargo run --release --locked -p xtasks -- gen-dist dist-assets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: forge-assets
          path: dist-assets/**
          if-no-files-found: error

  # Raw per-platform binary only — no packaging here. Packaging (bundling README/LICENSE/
  # completions/man page into the final archive) now happens once in `release`, after both this
  # and `assets` finish, so this job has zero dependency on `assets` and starts immediately.
  build:
    name: build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [release, linux, x64, heavy]
            target: x86_64-unknown-linux-gnu
            self_hosted: true
            portable_linux: true
            linux_cross: false
            bin: forge
          # Keep ARM on the dedicated Arch release runner too. The pinned Bullseye container
          # supplies its aarch64 cross-linker and a glibc 2.31 sysroot, so this neither spends
          # hosted-runner quota nor inherits the rolling host's glibc/libstdc++ requirements.
          - os: [release, linux, x64, heavy]
            target: aarch64-unknown-linux-gnu
            self_hosted: true
            portable_linux: true
            linux_cross: true
            bin: forge
          - os: macos-latest
            target: aarch64-apple-darwin
            self_hosted: false
            portable_linux: false
            linux_cross: false
            bin: forge
          - os: macos-latest
            target: x86_64-apple-darwin
            self_hosted: false
            portable_linux: false
            linux_cross: false
            bin: forge
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            self_hosted: false
            portable_linux: false
            linux_cross: false
            bin: forge.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/tags/${{ inputs.release_tag }}

      - name: Install Rust
        if: ${{ !matrix.portable_linux }}
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: ${{ matrix.target }}

      # Ephemeral GitHub-hosted legs have no warm target/ dir, so the cache earns its keep.
      # The portable Linux legs instead use dedicated Docker volumes on the release runner.
      - if: ${{ !matrix.self_hosted }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.portable_linux }}
        env:
          FORGE_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          FORGE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          FORGE_DISTRIBUTION: github-release
        run: cargo build --release --locked --bin forge --target ${{ matrix.target }}

      - name: Build portable Linux binary in Bullseye
        if: ${{ matrix.portable_linux }}
        shell: bash
        env:
          FORGE_POSTHOG_KEY: ${{ vars.POSTHOG_PROJECT_KEY }}
          FORGE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          FORGE_DISTRIBUTION: github-release
          LINUX_CROSS: ${{ matrix.linux_cross }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          image='rust:1.88.0-bullseye@sha256:b315f988b86912bafa7afd39a6ded0a497bf850ec36578ca9a3bdd6a14d5db4e'
          artifact_dir="$GITHUB_WORKSPACE/target/$TARGET/release"
          cache_target="forge-release-bullseye-target-${TARGET//_/-}"
          mkdir -p "$artifact_dir"

          docker pull "$image"
          docker run --rm \
            --env CARGO_TARGET_DIR=/out \
            --env FORGE_DISTRIBUTION \
            --env FORGE_POSTHOG_HOST \
            --env FORGE_POSTHOG_KEY \
            --env HOST_GID="$(id -g)" \
            --env HOST_UID="$(id -u)" \
            --env LINUX_CROSS \
            --env TARGET \
            --volume "$GITHUB_WORKSPACE:/workspace:ro" \
            --volume "$artifact_dir:/artifact" \
            --volume forge-release-cargo-git:/usr/local/cargo/git \
            --volume forge-release-cargo-registry:/usr/local/cargo/registry \
            --volume "$cache_target:/out" \
            --workdir /workspace \
            "$image" \
            bash -euxo pipefail -c '
              apt-get update -qq
              packages=(cmake libclang-dev)
              if [[ "$LINUX_CROSS" == true ]]; then
                packages+=(gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user)
              fi
              apt-get install -y -qq --no-install-recommends "${packages[@]}"

              if [[ "$LINUX_CROSS" == true ]]; then
                rustup target add "$TARGET"
                export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
                export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
                export BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu="--target=aarch64-linux-gnu --sysroot=/usr/aarch64-linux-gnu"
              fi

              cargo build --release --locked --bin forge --target "$TARGET"
              install -m 0755 "/out/$TARGET/release/forge" /artifact/forge
              chown "$HOST_UID:$HOST_GID" /artifact/forge

              if [[ "$LINUX_CROSS" == true ]]; then
                qemu-aarch64 -L /usr/aarch64-linux-gnu /artifact/forge --version
              else
                /artifact/forge --version
              fi
            '

      - name: Verify portable Linux runtime dependencies
        if: ${{ matrix.portable_linux }}
        shell: bash
        run: scripts/check-linux-runtime-deps.sh "target/${{ matrix.target }}/release/${{ matrix.bin }}"

      - name: Upload raw binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: forge-raw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: package + publish release
    needs: [assets, build]
    runs-on: [release, linux, x64]
    timeout-minutes: 30
    environment: release
    if: startsWith(inputs.release_tag, 'v')
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: write
      actions: write # dispatches required workflows against the generated distribution-manifest PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/tags/${{ inputs.release_tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: forge-assets
          path: dist-assets

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: forge-raw-*
          path: raw

      - name: Verify native release binary version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          binary=raw/forge-raw-x86_64-unknown-linux-gnu/forge
          chmod 0755 "$binary"
          [ "$("$binary" --version)" = "forge ${RELEASE_TAG#v}" ] || {
            echo "native release binary version does not match $RELEASE_TAG" >&2
            exit 1
          }

      # Assemble each platform's final archive here (not per-matrix-leg): now that `assets` and
      # `build` run fully in parallel, this is the one place that needs both. Doing it once also
      # collapses the old per-OS bash/pwsh packaging duplication into a single script — a
      # zip/tar.gz archive is just a generic container, it doesn't need to be built on the OS
      # it's targeting.
      - name: Package all platforms
        run: |
          set -euo pipefail
          declare -A ARCHIVE=(
            [x86_64-unknown-linux-gnu]=tar.gz
            [aarch64-unknown-linux-gnu]=tar.gz
            [aarch64-apple-darwin]=tar.gz
            [x86_64-apple-darwin]=tar.gz
            [x86_64-pc-windows-msvc]=zip
          )
          declare -A BIN=(
            [x86_64-unknown-linux-gnu]=forge
            [aarch64-unknown-linux-gnu]=forge
            [aarch64-apple-darwin]=forge
            [x86_64-apple-darwin]=forge
            [x86_64-pc-windows-msvc]=forge.exe
          )
          mkdir -p dist
          for target in "${!ARCHIVE[@]}"; do
            dir="forge-${target}"
            mkdir "$dir"
            cp "raw/forge-raw-${target}/${BIN[$target]}" "$dir/"
            # upload/download-artifact does not preserve Unix mode bits. Without this, users who
            # unpack a tarball manually receive a non-executable `forge` even though install.sh
            # happens to repair it with `install -m 0755`.
            [ "${target}" = x86_64-pc-windows-msvc ] || chmod 0755 "$dir/${BIN[$target]}"
            cp README.md LICENSE "$dir/" 2>/dev/null || true
            cp -r dist-assets/completions "$dir/" 2>/dev/null || true
            cp dist-assets/forge.1 "$dir/" 2>/dev/null || true
            if [ "${ARCHIVE[$target]}" = "zip" ]; then
              zip -r -y "dist/$dir.zip" "$dir"
            else
              tar czf "dist/$dir.tar.gz" "$dir"
            fi
          done
          ls -la dist

      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt 2>/dev/null || sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      # Keep one curated note for the CLI/TUI and desktop release. Mobile's native app version
      # is independent; routine mobile changes ship through the production OTA channel. A new
      # TestFlight binary is a separately triggered Xcode Cloud operation when native changes
      # require it. Hybrid: generate_release_notes below appends GitHub's auto PR list.
      - name: Compose release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          {
            echo "## Forge v${VERSION}"
            echo
            echo "CLI/TUI and desktop release v${VERSION}; mobile remains on its compatible native version."
            echo "- **CLI / TUI** — binaries below (\`*.tar.gz\` / \`*.zip\`) or \`brew upgrade forge\`"
            echo "- **Desktop** (macOS · Windows · Linux) — app bundles below + in-app auto-update"
            echo "- **Mobile** (iOS) — production OTA by default; native/TestFlight builds are manual when required"
            echo
            # Curated CHANGELOG section for this version, if present.
            awk -v ver="[${VERSION}]" '
              $0 ~ /^## / { if (grab) exit; if (index($0, ver)) { grab=1; next } }
              grab { print }
            ' CHANGELOG.md
          } > dist/RELEASE_NOTES.md
          echo "----- composed release body -----"; cat dist/RELEASE_NOTES.md

      - name: Attest CLI/TUI release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          body_path: dist/RELEASE_NOTES.md
          generate_release_notes: true
          fail_on_unmatched_files: false
          make_latest: true

      # Keep Homebrew, AUR metadata, and Scoop in step with THIS release's just-built checksums (no "sha
      # race" against assets that don't exist yet). Opens a PR because main is branch-protected.
      # This is a required release stage: a published binary with broken/stale package-manager
      # metadata is an incomplete release, so failures stay visible instead of being swallowed.
      #
      # The PR is opened using GITHUB_TOKEN, so its `pull_request` event does NOT spawn a new
      # workflow run (GitHub's anti-recursion guard on the default token) — the branch-protection-
      # required checks would otherwise never appear on it, leaving `gh pr merge --auto` stuck
      # forever. `workflow_dispatch` is explicitly exempt from that guard, so we manually dispatch
      # every required workflow against the PR branch before enabling auto-merge.
      - name: Update package-manager manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" brew-repo
          cd brew-repo
          bash scripts/update-package-manifests.sh "$VERSION" "$GITHUB_WORKSPACE/dist/checksums.txt"
          (cd packaging/aur && makepkg --printsrcinfo > .SRCINFO)
          if git diff --quiet Formula/forge.rb packaging/aur/PKGBUILD packaging/aur/.SRCINFO bucket/forge.json; then
            echo "package manifests already current"; exit 0
          fi
          BRANCH="dist/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/forge.rb packaging/aur/PKGBUILD packaging/aur/.SRCINFO bucket/forge.json
          git commit -m "chore(dist): update manifests to v$VERSION"
          git push -f origin "$BRANCH"
          if ! gh pr view "$BRANCH" --json url --jq .url >/dev/null 2>&1; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore(dist): update package manifests to v$VERSION" \
              --body "Auto-generated by release.yml after publishing v$VERSION. Homebrew, AUR, and Scoop hashes come from this release's checksums.txt."
          fi
          for workflow in ci.yml security.yml mobile-typecheck.yml codeql.yml; do
            gh workflow run "$workflow" --ref "$BRANCH"
          done
          gh pr merge "$BRANCH" --squash --auto

      - name: Dispatch matching desktop and web releases from protected main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh workflow run app-desktop.yml --ref main -f release_tag="$RELEASE_TAG"
          gh workflow run app-web.yml --ref main -f release_tag="$RELEASE_TAG"
