name: security

# Supply-chain gate: RUSTSEC advisories (cargo-audit) + licenses/bans/sources (cargo-deny). PRs run
# only the checks affected by dependency metadata; weekly/manual runs remain comprehensive so they
# catch advisories published after a lockfile was merged. No `push: branches:
# [main]` trigger: every merge to main goes through a PR, so `pull_request` already validated the
# exact same tree before merge — a push-triggered rerun on the post-squash commit would just
# repeat that same check for free.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: "4"

jobs:
  changes:
    name: detect affected jobs
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    outputs:
      cargo_audit: ${{ steps.classify.outputs.cargo_audit }}
      cargo_deny: ${{ steps.classify.outputs.cargo_deny }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/changed-groups.sh

  audit:
    name: cargo audit (RUSTSEC)
    needs: changes
    if: needs.changes.outputs.cargo_audit == 'true'
    runs-on: [self-hosted, linux, x64, heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # install-action's checksum metadata can briefly lag a binary release. Compile the pinned
      # tool once per persistent Arch runner instead of trusting that external file every run.
      - name: Ensure cargo-audit is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo audit --version 2>/dev/null | grep -q '0.22.2' || cargo install --locked cargo-audit --version 0.22.2
      # Fail on any vulnerability OR any unmaintained/unsound/yanked warning (--deny warnings),
      # EXCEPT the documented advisories below (kept in sync with deny.toml
      # [advisories].ignore). Real vulnerabilities are fixed via lockfile/dependency bumps and
      # are never ignored. The remaining exceptions are documented unmaintained-crate warnings
      # with no known vulnerability or compatible replacement.
      - name: cargo audit
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2025-0141
          cargo audit --file vendor/genai-0.6.5/Cargo.lock --deny warnings \
            --ignore RUSTSEC-2024-0436

  deny:
    name: cargo deny (licenses + bans + advisories)
    needs: changes
    if: needs.changes.outputs.cargo_deny == 'true'
    runs-on: [self-hosted, linux, x64, heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Need a real toolchain: `cargo deny check` runs `cargo metadata` under the hood.
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - name: Ensure cargo-deny is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo deny --version 2>/dev/null | grep -q '0.20.2' || cargo install --locked cargo-deny --version 0.20.2
      # Plain `cargo deny check` runs all four checks (advisories + bans + licenses + sources)
      # against the committed deny.toml. Driven directly (not via cargo-deny-action) so the CLI
      # surface matches what we validate locally — the action puts `arguments` BEFORE the
      # subcommand, which broke `cargo deny check all` ("unrecognized subcommand 'all'").
      - run: cargo deny check
      - run: cargo deny --manifest-path vendor/genai-0.6.5/Cargo.toml check

  security:
    name: security checks
    needs: [changes, audit, deny]
    if: always()
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - name: Check affected jobs passed
        run: |
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.audit.result }}" \
            "${{ needs.deny.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "An affected security job failed or was cancelled"; exit 1 ;;
            esac
          done
          echo "All affected security jobs passed"
