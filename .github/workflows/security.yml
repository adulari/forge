name: security

# Supply-chain gate: RUSTSEC advisories (cargo-audit) + licenses/bans/sources (cargo-deny).
# Runs on every PR to main and weekly — a scheduled run catches advisories published AFTER a PR
# merged, which a PR-only trigger would miss against a static Cargo.lock. No `push: branches:
# [main]` trigger: every merge to main goes through a PR, so `pull_request` already validated the
# exact same tree before merge — a push-triggered rerun on the post-squash commit would just
# repeat that same check for free.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit (RUSTSEC)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
      # install-action's checksum metadata can briefly lag a binary release. Compile the pinned
      # tool once per persistent Arch runner instead of trusting that external file every run.
      - name: Ensure cargo-audit is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo audit --version 2>/dev/null | grep -q '0.22.2' || cargo install --locked cargo-audit --version 0.22.2
      # Fail on any vulnerability OR any unmaintained/unsound/yanked warning (--deny warnings),
      # EXCEPT the documented advisories below (kept in sync with deny.toml
      # [advisories].ignore). Real vulnerabilities are FIXED via lockfile bumps whenever a bump
      # exists — e.g. quinn-proto RUSTSEC-2026-0185 and anyhow RUSTSEC-2026-0190. The sole
      # exception class: a vulnerability whose every pulling parent is already at its latest
      # release with no compatible fixed version (quick-xml pair below) — ignored with a
      # revisit note instead of blocking all CI indefinitely.
      - name: cargo audit
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0052 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  deny:
    name: cargo deny (licenses + bans + advisories)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
      # Need a real toolchain: `cargo deny check` runs `cargo metadata` under the hood.
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure cargo-deny is installed
        run: |
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"
          cargo deny --version 2>/dev/null | grep -q '0.20.2' || cargo install --locked cargo-deny --version 0.20.2
      # Plain `cargo deny check` runs all four checks (advisories + bans + licenses + sources)
      # against the committed deny.toml. Driven directly (not via cargo-deny-action) so the CLI
      # surface matches what we validate locally — the action puts `arguments` BEFORE the
      # subcommand, which broke `cargo deny check all` ("unrecognized subcommand 'all'").
      - run: cargo deny check
